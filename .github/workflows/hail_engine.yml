name: Hail Lead Engine

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

jobs:
  hail-phase-0:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Quick discovery test
        run: |
          python -m pip install --upgrade pip
          pip install requests
          python worker/test_discover.py
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-dev
          python -m pip install --upgrade pip
          pip install -r worker/requirements.txt
      - name: Run worker unit tests
        run: |
          python -m pytest worker/test_hail_engine.py
      - name: Run hail worker dry run
        run: |
          cd worker
          python hail_engine.py latest --dry-run

  supabase-verify:
    needs: hail-phase-0
    if: github.event_name == 'workflow_dispatch' && secrets.SUPABASE_URL && secrets.SUPABASE_SERVICE_ROLE_KEY
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r worker/requirements.txt
      - name: Verify Supabase read-only access
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cd worker
          python verify_supabase.py --dry-run
